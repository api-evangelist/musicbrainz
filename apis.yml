apis:
- aid: musicbrainz:musicbrainz-web-service
  name: MusicBrainz Web Service v2
  description: The MusicBrainz Web Service v2 provides a free read-mostly REST API
    over the entire MusicBrainz catalog of music metadata. It supports three primary
    access patterns - lookup (fetch one entity by MBID), browse (list entities linked
    to a parent entity), and search (Lucene query across the indexed catalog) - across
    twelve core entity types (artist, release, release-group, recording, work, label,
    place, area, event, instrument, series, url, genre). Non-MBID lookups are available
    for ISRC (recordings), ISWC (works), disc IDs (releases), and URLs. Authenticated
    submission endpoints (HTTP Basic or OAuth2) allow clients to submit tags, ratings,
    collection membership, barcodes, and ISRCs. Responses are returned in XML (default)
    or JSON via the `fmt=json` parameter. The service enforces a strict one-request-per-second-per-IP
    rate limit and requires a meaningful User-Agent header on every request.
  humanURL: https://musicbrainz.org/doc/MusicBrainz_API
  baseURL: https://musicbrainz.org/ws/2
  tags:
