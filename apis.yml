aid: musicbrainz
name: MusicBrainz
description: MusicBrainz is an open-source, community-maintained music encyclopedia
  operated by the MetaBrainz Foundation, a US 501(c)(3) non-profit. It collects metadata
  about artists, releases, recordings, works, labels, places, areas, events, instruments,
  series, URLs, and the relationships between them, then exposes the catalog through
  a free public REST web service at https://musicbrainz.org/ws/2/. The dataset itself
  is released under CC0 (core data) and CC-BY-NC-SA (supplemental tables), the schema
  is open, and full database dumps and a live replication feed are available. The
  web service is read-mostly with authenticated submission endpoints for tags, ratings,
  collections, barcodes, and ISRCs, and is rate-limited to one request per IP per
  second with a mandatory descriptive User-Agent header.
