    url: https://github.com/metabrainz/mmd-schema
    title: MMD RELAX NG Schema
  - url: graphql/musicbrainz-graphql.md
    type: GraphQL
  features:
  - type: EntityLookup
    description: Fetch any of twelve entity types (artist, release, release-group,
      recording, work, label, place, area, event, instrument, series, url) by MBID
      with configurable sub-resource includes.
  - type: BrowseRelationships
    description: List all entities linked to a given parent entity (e.g. all releases
      by an artist, all recordings on a release) with pagination.
  - type: LuceneSearch
    description: Full Lucene query syntax across all indexed entities with per-entity
      searchable fields, scoring, and 100-result pages.
  - type: IdentifierLookups
    description: Direct lookups by industry identifiers - ISRC for recordings, ISWC
      for works, DiscID for releases, and arbitrary URLs.
  - type: RichRelationships
    description: First-class typed relationships between entities (composer, lyricist,
      performer, member-of-band, location-of-event, etc.) returned via `inc=*-rels`
      parameters.
  - type: CommunityTagsAndRatings
    description: Public folksonomy tags and aggregate 1-5 ratings on every entity,
      plus per-user tags and ratings for authenticated users.
  - type: UserCollections
    description: Authenticated users can maintain typed collections (release, recording,
      work, etc.) and clients can add or remove entities via PUT/DELETE.
  - type: SubmissionEndpoints
    description: Authenticated POST endpoints for submitting user tags, ratings, release
      barcodes, and recording ISRCs without going through the editor UI.
  - type: GenreTaxonomy
    description: Dedicated `/genre/all` endpoint returning the full curated genre
      taxonomy in XML, JSON, or plain text.
  - type: FormatChoice
    description: All responses available in MMD-2 XML (default, supports submission)
      or JSON (`fmt=json`, read-only).
  useCases:
  - type: MusicLibraryTagging
    description: Look up canonical artist, release, recording, and work metadata to
      tag local music libraries (Picard, beets, MusicBee, Roon).
  - type: DiscographyEnrichment
    description: Pull complete discographies, credits, and relationships for an artist
      or label into a music app, store, or knowledge graph.
  - type: AcousticIdentification
    description: Combine MusicBrainz IDs with AcoustID fingerprints to identify unknown
      audio files and retrieve full metadata.
  - type: CDIdentification
    description: Use libdiscid + the `/discid` endpoint to identify physical CDs from
      their TOC and fetch the corresponding release.
  - type: ISRCAndISWCResolution
    description: Resolve industry identifiers (ISRC, ISWC) to canonical recording
      and work metadata for rights management and analytics workflows.
  - type: KnowledgeGraphIngestion
    description: Ingest MusicBrainz dumps or the live replication feed into a property
      graph or RDF store for music research and recommendation systems.
  - type: WikidataCrossReference
    description: Bridge between MusicBrainz MBIDs and Wikidata QIDs / Wikipedia articles
      via stored URL relationships.
  - type: CoverArtRetrieval
    description: Use MBIDs returned by the API to fetch high-resolution release artwork
      from the companion Cover Art Archive.
  integrations:
  - name: MusicBrainz Picard
    description: Official cross-platform music tagger built on the MusicBrainz API;
      canonical end-user client.
    url: https://picard.musicbrainz.org/
  - name: AcoustID
    description: Open audio fingerprinting database that returns MBIDs for identified
      recordings.
    url: https://acoustid.org/
  - name: Cover Art Archive
    description: Sister project that stores release artwork keyed by MusicBrainz release
      MBID.
    url: https://coverartarchive.org/
  - name: ListenBrainz
    description: MetaBrainz sister project for listening history; uses MusicBrainz
      MBIDs as the canonical identifier for tracks and artists.
    url: https://listenbrainz.org/
  - name: Wikidata
    description: Bidirectional cross-references via the MusicBrainz MBID external
      identifier on Wikidata and URL relationships in MusicBrainz.
    url: https://www.wikidata.org/wiki/Property:P434
  - name: Discogs
    description: Cross-referenced via stored URL relationships; many MusicBrainz releases
      link to a Discogs release.
    url: https://www.discogs.com/
