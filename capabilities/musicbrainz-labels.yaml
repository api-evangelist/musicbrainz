naftiko: 1.0.0-alpha2
info:
  label: MusicBrainz Web Service v2 — Labels
  description: 'MusicBrainz Web Service v2 — Labels. 2 operations. Lead operation: Lookup Label By MBID. Self-contained Naftiko
    capability covering one MusicBrainz business surface.'
  tags:
  - MusicBrainz
  - Labels
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
- namespace: env
  keys:
    MUSICBRAINZ_USER_AGENT: MUSICBRAINZ_USER_AGENT
capability:
  consumes:
  - type: http
    namespace: musicbrainz-labels
    baseUri: https://musicbrainz.org/ws/2
    description: MusicBrainz Web Service v2 — Labels business capability. Self-contained, no shared references.
    resources:
    - name: label-mbid
      path: /label/{mbid}
      operations:
      - name: lookupLabel
        method: GET
        description: Lookup Label By MBID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mbid
          in: path
          type: string
          required: true
        - name: inc
          in: query
          type: string
        - name: fmt
          in: query
          type: string
    - name: label
      path: /label
      operations:
      - name: browseOrSearchLabels
        method: GET
        description: Browse Or Search Labels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
        - name: area
          in: query
          type: string
        - name: collection
          in: query
          type: string
        - name: release
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        - name: inc
          in: query
          type: string
        - name: fmt
          in: query
          type: string
    headers:
      User-Agent: '{{env.MUSICBRAINZ_USER_AGENT}}'
      Accept: application/json
  exposes:
  - type: rest
    namespace: musicbrainz-labels-rest
    port: 8080
    description: REST adapter for MusicBrainz Web Service v2 — Labels. One Spectral-compliant resource per consumed operation,
      prefixed with /ws/2.
    resources:
    - path: /ws/2/label/{mbid}
      name: label-mbid
      description: REST surface for label-mbid.
      operations:
      - method: GET
        name: lookupLabel
        description: Lookup Label By MBID
        call: musicbrainz-labels.lookupLabel
        outputParameters:
        - type: object
          mapping: $.
        with:
          mbid: rest.mbid
          inc: rest.inc
          fmt: rest.fmt
    - path: /ws/2/label
      name: label
      description: REST surface for label.
      operations:
      - method: GET
        name: browseOrSearchLabels
        description: Browse Or Search Labels
        call: musicbrainz-labels.browseOrSearchLabels
        outputParameters:
        - type: object
          mapping: $.
        with:
          query: rest.query
          area: rest.area
          collection: rest.collection
          release: rest.release
          limit: rest.limit
          offset: rest.offset
          inc: rest.inc
          fmt: rest.fmt
  - type: mcp
    namespace: musicbrainz-labels-mcp
    port: 9090
    transport: http
    description: MCP adapter for MusicBrainz Web Service v2 — Labels. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: lookup-label
      description: Lookup Label By MBID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: musicbrainz-labels.lookupLabel
      outputParameters:
      - type: object
        mapping: $.
      with:
        mbid: tools.mbid
        inc: tools.inc
        fmt: tools.fmt
    - name: browse-or-search-labels
      description: Browse Or Search Labels
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: musicbrainz-labels.browseOrSearchLabels
      outputParameters:
      - type: object
        mapping: $.
      with:
        query: tools.query
        area: tools.area
        collection: tools.collection
        release: tools.release
        limit: tools.limit
        offset: tools.offset
        inc: tools.inc
        fmt: tools.fmt
