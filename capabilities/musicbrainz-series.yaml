naftiko: 1.0.0-alpha2
info:
  label: MusicBrainz Web Service v2 — Series
  description: 'MusicBrainz Web Service v2 — Series. 2 operations. Lead operation: Lookup Series By MBID. Self-contained Naftiko
    capability covering one MusicBrainz business surface.'
  tags:
  - MusicBrainz
  - Series
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
- namespace: env
  keys:
    MUSICBRAINZ_USER_AGENT: MUSICBRAINZ_USER_AGENT
capability:
  consumes:
  - type: http
    namespace: musicbrainz-series
    baseUri: https://musicbrainz.org/ws/2
    description: MusicBrainz Web Service v2 — Series business capability. Self-contained, no shared references.
    resources:
    - name: series-mbid
      path: /series/{mbid}
      operations:
      - name: lookupSeries
        method: GET
        description: Lookup Series By MBID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mbid
          in: path
          type: string
          required: true
        - name: inc
          in: query
          type: string
        - name: fmt
          in: query
          type: string
    - name: series
      path: /series
      operations:
      - name: browseOrSearchSeriess
        method: GET
        description: Browse Or Search Series
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
        - name: collection
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        - name: inc
          in: query
          type: string
        - name: fmt
          in: query
          type: string
    headers:
      User-Agent: '{{env.MUSICBRAINZ_USER_AGENT}}'
      Accept: application/json
  exposes:
  - type: rest
    namespace: musicbrainz-series-rest
    port: 8080
    description: REST adapter for MusicBrainz Web Service v2 — Series. One Spectral-compliant resource per consumed operation,
      prefixed with /ws/2.
    resources:
    - path: /ws/2/series/{mbid}
      name: series-mbid
      description: REST surface for series-mbid.
      operations:
      - method: GET
        name: lookupSeries
        description: Lookup Series By MBID
        call: musicbrainz-series.lookupSeries
        outputParameters:
        - type: object
          mapping: $.
        with:
          mbid: rest.mbid
          inc: rest.inc
          fmt: rest.fmt
    - path: /ws/2/series
      name: series
      description: REST surface for series.
      operations:
      - method: GET
        name: browseOrSearchSeriess
        description: Browse Or Search Series
        call: musicbrainz-series.browseOrSearchSeriess
        outputParameters:
        - type: object
          mapping: $.
        with:
          query: rest.query
          collection: rest.collection
          limit: rest.limit
          offset: rest.offset
          inc: rest.inc
          fmt: rest.fmt
  - type: mcp
    namespace: musicbrainz-series-mcp
    port: 9090
    transport: http
    description: MCP adapter for MusicBrainz Web Service v2 — Series. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: lookup-series
      description: Lookup Series By MBID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: musicbrainz-series.lookupSeries
      outputParameters:
      - type: object
        mapping: $.
      with:
        mbid: tools.mbid
        inc: tools.inc
        fmt: tools.fmt
    - name: browse-or-search-series
      description: Browse Or Search Series
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: musicbrainz-series.browseOrSearchSeriess
      outputParameters:
      - type: object
        mapping: $.
      with:
        query: tools.query
        collection: tools.collection
        limit: tools.limit
        offset: tools.offset
        inc: tools.inc
        fmt: tools.fmt
