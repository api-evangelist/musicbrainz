naftiko: 1.0.0-alpha2
info:
  label: MusicBrainz Web Service v2 — Events
  description: 'MusicBrainz Web Service v2 — Events. 2 operations. Lead operation: Lookup Event By MBID. Self-contained Naftiko
    capability covering one MusicBrainz business surface.'
  tags:
  - MusicBrainz
  - Events
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
- namespace: env
  keys:
    MUSICBRAINZ_USER_AGENT: MUSICBRAINZ_USER_AGENT
capability:
  consumes:
  - type: http
    namespace: musicbrainz-events
    baseUri: https://musicbrainz.org/ws/2
    description: MusicBrainz Web Service v2 — Events business capability. Self-contained, no shared references.
    resources:
    - name: event-mbid
      path: /event/{mbid}
      operations:
      - name: lookupEvent
        method: GET
        description: Lookup Event By MBID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mbid
          in: path
          type: string
          required: true
        - name: inc
          in: query
          type: string
        - name: fmt
          in: query
          type: string
    - name: event
      path: /event
      operations:
      - name: browseOrSearchEvents
        method: GET
        description: Browse Or Search Events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
        - name: area
          in: query
          type: string
        - name: artist
          in: query
          type: string
        - name: collection
          in: query
          type: string
        - name: place
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        - name: inc
          in: query
          type: string
        - name: fmt
          in: query
          type: string
    headers:
      User-Agent: '{{env.MUSICBRAINZ_USER_AGENT}}'
      Accept: application/json
  exposes:
  - type: rest
    namespace: musicbrainz-events-rest
    port: 8080
    description: REST adapter for MusicBrainz Web Service v2 — Events. One Spectral-compliant resource per consumed operation,
      prefixed with /ws/2.
    resources:
    - path: /ws/2/event/{mbid}
      name: event-mbid
      description: REST surface for event-mbid.
      operations:
      - method: GET
        name: lookupEvent
        description: Lookup Event By MBID
        call: musicbrainz-events.lookupEvent
        outputParameters:
        - type: object
          mapping: $.
        with:
          mbid: rest.mbid
          inc: rest.inc
          fmt: rest.fmt
    - path: /ws/2/event
      name: event
      description: REST surface for event.
      operations:
      - method: GET
        name: browseOrSearchEvents
        description: Browse Or Search Events
        call: musicbrainz-events.browseOrSearchEvents
        outputParameters:
        - type: object
          mapping: $.
        with:
          query: rest.query
          area: rest.area
          artist: rest.artist
          collection: rest.collection
          place: rest.place
          limit: rest.limit
          offset: rest.offset
          inc: rest.inc
          fmt: rest.fmt
  - type: mcp
    namespace: musicbrainz-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for MusicBrainz Web Service v2 — Events. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: lookup-event
      description: Lookup Event By MBID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: musicbrainz-events.lookupEvent
      outputParameters:
      - type: object
        mapping: $.
      with:
        mbid: tools.mbid
        inc: tools.inc
        fmt: tools.fmt
    - name: browse-or-search-events
      description: Browse Or Search Events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: musicbrainz-events.browseOrSearchEvents
      outputParameters:
      - type: object
        mapping: $.
      with:
        query: tools.query
        area: tools.area
        artist: tools.artist
        collection: tools.collection
        place: tools.place
        limit: tools.limit
        offset: tools.offset
        inc: tools.inc
        fmt: tools.fmt
