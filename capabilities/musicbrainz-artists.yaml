naftiko: 1.0.0-alpha2
info:
  label: MusicBrainz Web Service v2 — Artists
  description: 'MusicBrainz Web Service v2 — Artists. 2 operations. Lead operation: Lookup Artist By MBID. Self-contained
    Naftiko capability covering one MusicBrainz business surface.'
  tags:
  - MusicBrainz
  - Artists
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
- namespace: env
  keys:
    MUSICBRAINZ_USER_AGENT: MUSICBRAINZ_USER_AGENT
capability:
  consumes:
  - type: http
    namespace: musicbrainz-artists
    baseUri: https://musicbrainz.org/ws/2
    description: MusicBrainz Web Service v2 — Artists business capability. Self-contained, no shared references.
    resources:
    - name: artist-mbid
      path: /artist/{mbid}
      operations:
      - name: lookupArtist
        method: GET
        description: Lookup Artist By MBID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: mbid
          in: path
          type: string
          required: true
        - name: inc
          in: query
          type: string
        - name: fmt
          in: query
          type: string
    - name: artist
      path: /artist
      operations:
      - name: browseOrSearchArtists
        method: GET
        description: Browse Or Search Artists
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
        - name: area
          in: query
          type: string
        - name: collection
          in: query
          type: string
        - name: recording
          in: query
          type: string
        - name: release
          in: query
          type: string
        - name: release-group
          in: query
          type: string
        - name: work
          in: query
          type: string
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
        - name: inc
          in: query
          type: string
        - name: fmt
          in: query
          type: string
    headers:
      User-Agent: '{{env.MUSICBRAINZ_USER_AGENT}}'
      Accept: application/json
  exposes:
  - type: rest
    namespace: musicbrainz-artists-rest
    port: 8080
    description: REST adapter for MusicBrainz Web Service v2 — Artists. One Spectral-compliant resource per consumed operation,
      prefixed with /ws/2.
    resources:
    - path: /ws/2/artist/{mbid}
      name: artist-mbid
      description: REST surface for artist-mbid.
      operations:
      - method: GET
        name: lookupArtist
        description: Lookup Artist By MBID
        call: musicbrainz-artists.lookupArtist
        outputParameters:
        - type: object
          mapping: $.
        with:
          mbid: rest.mbid
          inc: rest.inc
          fmt: rest.fmt
    - path: /ws/2/artist
      name: artist
      description: REST surface for artist.
      operations:
      - method: GET
        name: browseOrSearchArtists
        description: Browse Or Search Artists
        call: musicbrainz-artists.browseOrSearchArtists
        outputParameters:
        - type: object
          mapping: $.
        with:
          query: rest.query
          area: rest.area
          collection: rest.collection
          recording: rest.recording
          release: rest.release
          release-group: rest.release-group
          work: rest.work
          limit: rest.limit
          offset: rest.offset
          inc: rest.inc
          fmt: rest.fmt
  - type: mcp
    namespace: musicbrainz-artists-mcp
    port: 9090
    transport: http
    description: MCP adapter for MusicBrainz Web Service v2 — Artists. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: lookup-artist
      description: Lookup Artist By MBID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: musicbrainz-artists.lookupArtist
      outputParameters:
      - type: object
        mapping: $.
      with:
        mbid: tools.mbid
        inc: tools.inc
        fmt: tools.fmt
    - name: browse-or-search-artists
      description: Browse Or Search Artists
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: musicbrainz-artists.browseOrSearchArtists
      outputParameters:
      - type: object
        mapping: $.
      with:
        query: tools.query
        area: tools.area
        collection: tools.collection
        recording: tools.recording
        release: tools.release
        release-group: tools.release-group
        work: tools.work
        limit: tools.limit
        offset: tools.offset
        inc: tools.inc
        fmt: tools.fmt
